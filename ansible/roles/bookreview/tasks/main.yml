---
- name: Clone Book Review Repository
  git:
    repo: "{{ app_repo }}"
    dest: "/home/{{ admin_username }}/app"
    version: main
    force: yes
  become: true
  become_user: "{{ admin_username }}"

# --- BACKEND TASKS ---
- name: Install Backend dependencies
  npm:
    path: "/home/{{ admin_username }}/app/backend"
  become: true
  become_user: "{{ admin_username }}"

- name: Deploy Backend .env configuration
  template:
    src: backend_env.j2
    dest: "/home/{{ admin_username }}/app/backend/.env"
    mode: '0600'
  become: true
  become_user: "{{ admin_username }}"
  notify: Restart backend

- name: Start Backend with PM2
  shell: |
    pm2 describe book-backend > /dev/null || pm2 start src/server.js --name "book-backend"
  args:
    chdir: "/home/{{ admin_username }}/app/backend"
  become: true
  become_user: "{{ admin_username }}"
  register: pm2_result
  changed_when: "'starting' in pm2_result.stdout"

# --- FRONTEND TASKS ---
- name: Install Frontend dependencies
  npm:
    path: "/home/{{ admin_username }}/app/frontend"
  become: true
  become_user: "{{ admin_username }}"

- name: Build Frontend for Production
  shell: |
    export PATH=$PATH:$(pwd)/node_modules/.bin
    npm run build
  args:
    chdir: "/home/{{ admin_username }}/app/frontend"
    executable: /bin/bash
  become: true
  become_user: "{{ admin_username }}"

- name: Start Frontend with PM2
  shell: |
    export PATH=$PATH:$(pwd)/node_modules/.bin
    pm2 delete book-frontend || true
    pm2 start npm --name "book-frontend" -- start
  args:
    chdir: "/home/{{ admin_username }}/app/frontend"
    executable: /bin/bash
  become: true
  become_user: "{{ admin_username }}"